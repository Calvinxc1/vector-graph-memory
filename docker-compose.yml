version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-latest}
    container_name: ${QDRANT_CONTAINER_NAME:-vector-graph-qdrant}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"  # HTTP API
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - vector-graph-network

  janusgraph:
    image: janusgraph/janusgraph:${JANUSGRAPH_VERSION:-latest}
    container_name: ${JANUSGRAPH_CONTAINER_NAME:-vector-graph-janusgraph}
    ports:
      - "${JANUSGRAPH_PORT:-8182}:8182"  # Gremlin Server
    volumes:
      - janusgraph_storage:/var/lib/janusgraph
    environment:
      - JANUS_PROPS_TEMPLATE=berkeleyje-lucene
      - janusgraph.storage.backend=berkeleyje
      - janusgraph.storage.directory=/var/lib/janusgraph/data
      - janusgraph.index.search.backend=lucene
      - janusgraph.index.search.directory=/var/lib/janusgraph/index
    restart: unless-stopped
    networks:
      - vector-graph-network

volumes:
  qdrant_storage:
    driver: local
  janusgraph_storage:
    driver: local

networks:
  vector-graph-network:
    driver: bridge
