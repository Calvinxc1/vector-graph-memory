name: Release Recovery

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        type: string
      expected_pypi_state:
        description: Expected PyPI release state
        required: true
        type: choice
        options:
          - active
          - yanked
      package_name:
        description: PyPI package name
        required: false
        default: vector-graph-memory
        type: string

jobs:
  verify-release-state:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Verify GitHub release and PyPI state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION: ${{ inputs.version }}
          EXPECTED_PYPI_STATE: ${{ inputs.expected_pypi_state }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          package_name = os.environ["PACKAGE_NAME"]
          version = os.environ["VERSION"]
          expected_state = os.environ["EXPECTED_PYPI_STATE"]
          repository = os.environ["REPOSITORY"]
          github_token = os.environ["GITHUB_TOKEN"]

          pypi_url = f"https://pypi.org/pypi/{package_name}/{version}/json"
          try:
              with urllib.request.urlopen(pypi_url) as response:
                  pypi_release = json.load(response)
          except urllib.error.HTTPError as exc:
              raise SystemExit(
                  f"Failed to fetch PyPI release metadata for {package_name} {version}: {exc}"
              ) from exc

          urls = pypi_release.get("urls", [])
          if not urls:
              raise SystemExit(
                  f"No distribution files found on PyPI for {package_name} {version}"
              )

          all_yanked = all(file_info.get("yanked", False) for file_info in urls)
          expected_yanked = expected_state == "yanked"

          if all_yanked != expected_yanked:
              observed = "yanked" if all_yanked else "active"
              raise SystemExit(
                  f"PyPI state mismatch for {package_name} {version}: expected {expected_state}, observed {observed}"
              )

          github_url = (
              f"https://api.github.com/repos/{repository}/releases/tags/v{version}"
          )
          request = urllib.request.Request(
              github_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {github_token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request) as response:
                  release = json.load(response)
          except urllib.error.HTTPError as exc:
              raise SystemExit(
                  f"Failed to fetch GitHub release for tag v{version}: {exc}"
              ) from exc

          print(
              f"Verified GitHub release {release['tag_name']} and PyPI state {expected_state} for {package_name} {version}"
          )
          PY
